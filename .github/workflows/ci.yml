name: CI — Universal Verify Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Reusable cross-verification gate for every repo in the /c/one fleet.
# It runs the same multi-angle verification engine used by the daily loop,
# so a PR that breaks the closed-loop gate is blocked here too.

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (if any)
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install . || pip install -e . || true; fi

      - name: Install Node deps
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci || npm install

      - name: Install verification engine
        run: pip install requests

      - name: Run multi-angle verification gate
        run: |
          python .github/verify_ci.py --repo . --json report.json
          python - <<'PY'
          import json
          r = json.load(open('report.json'))
          rep = r['reports'][0]
          print("GATE:", rep['gate'], "| score:", rep['score'])
          for a, v in rep['angles'].items():
              print(f"  {a:12s} {v['status']:18s} {v['score']}")
          if rep['gate'] == 'FAIL':
              print("VERIFICATION GATE FAILED")
              raise SystemExit(1)
          PY

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: report.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
