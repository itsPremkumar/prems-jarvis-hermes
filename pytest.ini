[pytest]
# The `langsmith` pytest plugin crashes the runner in this environment
# (pydantic 2.12.5 vs pydantic-core 2.46.4 version mismatch -> SystemError on import).
# It is unrelated to Jarvis' own tests, so disable it. Tests run green: `python -m pytest -q`.
addopts = -p no:langsmith_plugin
testpaths = tests
